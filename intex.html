<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Hand Strings</title>

  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Hidden video element — MediaPipe reads from this */
    #inputVideo {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* p5 canvas fills the screen */
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    #status {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0, 255, 255, 0.6);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow: 0 0 10px cyan;
      pointer-events: none;
      z-index: 20;
      transition: opacity 0.5s;
    }

    #title {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.15);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s ease;
    }

    #splash h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-family: 'Courier New', monospace;
      font-weight: 700;
      letter-spacing: 0.2em;
      background: linear-gradient(90deg, #00ffff, #ff00ff, #ffff00, #00ffff);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes shimmer {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 300% 50%;
      }
    }

    #splash p {
      color: rgba(255, 255, 255, 0.45);
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      text-align: center;
      padding: 0 2rem;
    }

    #startBtn {
      padding: 14px 40px;
      background: transparent;
      border: 1px solid rgba(0, 255, 255, 0.5);
      color: #00ffff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.15), inset 0 0 20px rgba(0, 255, 255, 0.05);
    }

    #startBtn:hover {
      background: rgba(0, 255, 255, 0.08);
      box-shadow: 0 0 35px rgba(0, 255, 255, 0.4), inset 0 0 20px rgba(0, 255, 255, 0.1);
      border-color: #00ffff;
    }

    .dot-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #00ffff;
      border-right-color: #ff00ff;
      animation: spin 1.4s linear infinite;
      margin-bottom: 2rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div id="splash">
    <h1>❤️</h1>
    <p>Bring both hands into frame</p>
    <div class="dot-ring"></div>
    <button id="startBtn">Enable Camera Access</button>
  </div>

  <div id="container">
    <video id="inputVideo" playsinline></video>
  </div>

  <div id="title">HAND STRINGS</div>
  <div id="status" id="status">Initializing…</div>

  <script>
    // ─── Shared State ──────────────────────────────────────────────────────────────
    const state = {
      hands: [],          // [{label, landmarks}]
      videoReady: false,
      videoEl: null,
      videoW: 640,
      videoH: 480,
    };

    // Finger tip indices (MediaPipe hand landmark indices)
    const FINGERTIPS = [4, 8, 12, 16, 20];  // thumb, index, middle, ring, pinky
    const FINGER_KNUCKLES = [
      [1, 2, 3, 4],     // thumb
      [5, 6, 7, 8],     // index
      [9, 10, 11, 12],  // middle
      [13, 14, 15, 16], // ring
      [17, 18, 19, 20], // pinky
    ];

    // Neon palette
    const COLORS = {
      cyan: [0, 255, 255],
      magenta: [255, 0, 255],
      yellow: [255, 255, 0],
      white: [255, 255, 255],
    };

    // ─── MediaPipe Setup ───────────────────────────────────────────────────────────
    let mpHands = null;
    let mpCamera = null;

    function initMediaPipe(videoEl) {
      mpHands = new Hands({
        locateFile: (file) =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });

      mpHands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.6,
      });

      mpHands.onResults((results) => {
        state.hands = [];
        if (results.multiHandLandmarks && results.multiHandedness) {
          results.multiHandLandmarks.forEach((lm, i) => {
            const label = results.multiHandedness[i].label; // "Left" or "Right"
            state.hands.push({ label, landmarks: lm });
          });
        }
        updateStatus();
      });

      mpCamera = new Camera(videoEl, {
        onFrame: async () => {
          await mpHands.send({ image: videoEl });
        },
        width: state.videoW,
        height: state.videoH,
        facingMode: 'user',
      });

      mpCamera.start().then(() => {
        state.videoReady = true;
        state.videoEl = videoEl;
        document.getElementById('status').textContent = 'Show both hands';
      }).catch((err) => {
        console.error('Camera error:', err);
        document.getElementById('status').textContent = 'Camera access denied';
      });
    }

    function updateStatus() {
      const el = document.getElementById('status');
      const count = state.hands.length;
      if (count === 0) el.textContent = 'Show both hands';
      else if (count === 1) el.textContent = `${state.hands[0].label} hand detected — show the other`;
      else el.textContent = '';
    }

    // ─── Splash / Start ────────────────────────────────────────────────────────────
    document.getElementById('startBtn').addEventListener('click', () => {
      const splash = document.getElementById('splash');
      splash.style.opacity = '0';
      setTimeout(() => { splash.style.display = 'none'; }, 800);

      const vid = document.getElementById('inputVideo');
      initMediaPipe(vid);
    });

    // ─── p5.js Sketch ─────────────────────────────────────────────────────────────
    new p5(function (p) {

      // Trail buffers for glowing echo effect on strings
      const STRING_HISTORY_LEN = 6;
      let stringHistory = [];  // array of frames, each = {left fingertips, right fingertips}

      // Per-frame time for animation
      let t = 0;

      p.setup = function () {
        const cnv = p.createCanvas(p.windowWidth, p.windowHeight);
        cnv.parent('container');
        p.colorMode(p.RGB, 255, 255, 255, 255);
        p.smooth();
        p.frameRate(60);
      };

      p.windowResized = function () {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
      };

      // Map a normalized MediaPipe landmark to canvas coords (mirrored X)
      function lmToCanvas(lm) {
        // MediaPipe gives 0–1 coords; mirror X for selfie view
        const x = (1 - lm.x) * p.width;
        const y = lm.y * p.height;
        return { x, y };
      }

      // Lerp between two RGB arrays
      function lerpColor3(a, b, t) {
        return [
          a[0] + (b[0] - a[0]) * t,
          a[1] + (b[1] - a[1]) * t,
          a[2] + (b[2] - a[2]) * t,
        ];
      }

      // Draw glowing neon dot
      function drawGlowDot(ctx, x, y, radius, r, g, b, alpha) {
        // Outer glow
        ctx.shadowBlur = 18;
        ctx.shadowColor = `rgba(${r},${g},${b},0.9)`;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha / 255})`;
        ctx.fill();

        // Inner bright core
        ctx.shadowBlur = 6;
        ctx.shadowColor = `rgba(255,255,255,0.9)`;
        ctx.beginPath();
        ctx.arc(x, y, radius * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${(alpha / 255) * 0.9})`;
        ctx.fill();

        ctx.shadowBlur = 0;
      }

      // Draw glow line between two points
      function drawGlowLine(ctx, x1, y1, x2, y2, r, g, b, alpha, width) {
        ctx.shadowBlur = 20;
        ctx.shadowColor = `rgba(${r},${g},${b},0.9)`;
        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha / 255})`;
        ctx.lineWidth = width;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      // Draw a glowing catenary-ish curved string between two points
      function drawString(ctx, x1, y1, x2, y2, r, g, b, alpha, width, sag) {
        const mx = (x1 + x2) / 2 + Math.sin(t * 1.2) * sag * 0.15;
        const my = (y1 + y2) / 2 + sag;

        ctx.shadowBlur = 45;
        ctx.shadowColor = `rgba(${r},${g},${b},1)`;
        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha / 255})`;
        ctx.lineWidth = width;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(mx, my, x2, y2);
        ctx.stroke();

        // Brighter core line
        ctx.shadowBlur = 8;
        ctx.shadowColor = `rgba(255,255,255,0.6)`;
        ctx.strokeStyle = `rgba(255,255,255,${(alpha / 255) * 0.35})`;
        ctx.lineWidth = width * 0.35;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(mx, my, x2, y2);
        ctx.stroke();

        ctx.shadowBlur = 0;
      }

      p.draw = function () {
        t += 0.03;
        const ctx = p.drawingContext;

        // ── Background: video or dark gradient ──
        ctx.save();
        if (state.videoReady && state.videoEl) {
          // Draw video (already mirrored via scaleX on canvas transform)
          ctx.save();
          ctx.translate(p.width, 0);
          ctx.scale(-1, 1);
          ctx.globalAlpha = 0.70;
          ctx.drawImage(state.videoEl, 0, 0, p.width, p.height);
          ctx.restore();

          // Dark overlay for cinematic depth
          ctx.globalAlpha = 0.30;
          ctx.fillStyle = '#000';
          ctx.fillRect(0, 0, p.width, p.height);
          ctx.globalAlpha = 1.0;
        } else {
          // Pure dark background before camera
          const grad = ctx.createRadialGradient(
            p.width / 2, p.height / 2, 0,
            p.width / 2, p.height / 2, p.width * 0.7
          );
          grad.addColorStop(0, '#0a0a12');
          grad.addColorStop(1, '#000005');
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, p.width, p.height);
        }

        ctx.restore();

        // ── Collect hands by side ──
        let leftHand = null;
        let rightHand = null;
        for (const h of state.hands) {
          // MediaPipe labels are from the camera's perspective,
          // but since we mirror X, we swap Left<>Right for the user's view.
          if (h.label === 'Right') leftHand = h;
          else rightHand = h;
        }

        // ── Draw hand skeletons & dots ──
        for (const h of state.hands) {
          drawHandSkeleton(ctx, h);
        }

        // ── Draw cradle strings ──
        if (leftHand && rightHand) {
          const leftTips = FINGERTIPS.map(i => lmToCanvas(leftHand.landmarks[i]));
          const rightTips = FINGERTIPS.map(i => lmToCanvas(rightHand.landmarks[i]));

          // Store history frame
          stringHistory.push({ leftTips: [...leftTips], rightTips: [...rightTips] });
          if (stringHistory.length > STRING_HISTORY_LEN) stringHistory.shift();

          // Calculate spread distance for color/thickness modulation
          const palmL = lmToCanvas(leftHand.landmarks[0]);
          const palmR = lmToCanvas(rightHand.landmarks[0]);
          const dist = Math.hypot(palmR.x - palmL.x, palmR.y - palmL.y);
          const maxDist = p.width * 0.8;
          const spread = Math.min(dist / maxDist, 1.0); // 0=close, 1=far

          // Draw ghost trail (older frames, faded)
          for (let h = 0; h < stringHistory.length - 1; h++) {
            const frame = stringHistory[h];
            const age = (h + 1) / stringHistory.length;
            const trailAlpha = age * 40; // very faint echoes
            drawCradleStrings(ctx, frame.leftTips, frame.rightTips, spread, trailAlpha, t);
          }

          // Draw main strings
          drawCradleStrings(ctx, leftTips, rightTips, spread, 220, t);

          // Extra web: connect adjacent left-to-right fingertips diagonally
          drawDiagonalWeb(ctx, leftTips, rightTips, spread, t);
        }

        // ── Ambient scanline pulse ──
        drawScanlines(ctx);
      };

      function drawHandSkeleton(ctx, hand) {
        const lm = hand.landmarks;

        // Draw bone connections
        const connections = [
          [0, 1], [1, 2], [2, 3], [3, 4],       // thumb
          [0, 5], [5, 6], [6, 7], [7, 8],       // index
          [5, 9], [9, 10], [10, 11], [11, 12],  // middle
          [9, 13], [13, 14], [14, 15], [15, 16],// ring
          [13, 17], [17, 18], [18, 19], [19, 20],// pinky
          [0, 17], [0, 5],                  // palm outer
        ];

        ctx.save();
        for (const [a, b] of connections) {
          const pa = lmToCanvas(lm[a]);
          const pb = lmToCanvas(lm[b]);
          ctx.shadowBlur = 8;
          ctx.shadowColor = 'rgba(0,200,255,0.5)';
          ctx.strokeStyle = 'rgba(0,200,255,0.2)';
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(pa.x, pa.y);
          ctx.lineTo(pb.x, pb.y);
          ctx.stroke();
        }
        ctx.restore();

        // Draw landmark dots
        lm.forEach((point, idx) => {
          const pos = lmToCanvas(point);
          const isTip = FINGERTIPS.includes(idx);

          let r, g, b, dotRadius;
          if (isTip) {
            // Fingertips: pick color by finger
            const tipIdx = FINGERTIPS.indexOf(idx);
            const palettes = [COLORS.yellow, COLORS.cyan, COLORS.magenta, COLORS.cyan, COLORS.yellow];
            [r, g, b] = palettes[tipIdx];
            dotRadius = 6;
          } else if (idx === 0) {
            [r, g, b] = COLORS.white;
            dotRadius = 4;
          } else {
            [r, g, b] = [100, 180, 255];
            dotRadius = 3;
          }

          // Pulse tips
          if (isTip) {
            const pulse = 1 + 0.25 * Math.sin(t * 3 + idx);
            dotRadius *= pulse;
          }

          drawGlowDot(ctx, pos.x, pos.y, dotRadius, r, g, b, 230);
        });
      }

      // cradle: connect each left fingertip to the corresponding right fingertip
      function drawCradleStrings(ctx, leftTips, rightTips, spread, alpha, time) {
        const fingerColors = [
          COLORS.yellow,   // thumb
          COLORS.cyan,     // index
          COLORS.magenta,  // middle
          COLORS.cyan,     // ring
          COLORS.yellow,   // pinky
        ];

        for (let i = 0; i < 5; i++) {
          const L = leftTips[i];
          const R = rightTips[i];
          if (!L || !R) continue;

          // Elastic thickness: thicker when closer, thinner when far
          const thickness = p.map(spread, 0, 1, 3.5, 1.0);
          const [r, g, b] = fingerColors[i];

          // Sag increases with spread and oscillates slightly
          const sag = spread * 40 * Math.sin(time * 0.8 + i * 0.4);

          // Color shifts toward magenta as spread increases
          const [er, eg, eb] = lerpColor3([r, g, b], COLORS.magenta, spread * 0.5);

          ctx.save();
          drawString(ctx, L.x, L.y, R.x, R.y, er, eg, eb, alpha, thickness, sag);
          ctx.restore();
        }
      }

      // Extra web: index→middle and middle→ring cross-connections for visual complexity
      function drawDiagonalWeb(ctx, leftTips, rightTips, spread, time) {
        const diagonals = [
          [0, 4], // thumb L → pinky R
          [4, 0], // pinky L → thumb R
          [1, 3], // index L → ring R
          [3, 1], // ring  L → index R
        ];

        for (const [li, ri] of diagonals) {
          const L = leftTips[li];
          const R = rightTips[ri];
          if (!L || !R) continue;

          const alpha = 60 + spread * 80;
          const sag = spread * 25 * Math.cos(time * 0.6 + li);

          ctx.save();
          drawString(ctx, L.x, L.y, R.x, R.y, 180, 80, 255, alpha, 0.8, sag);
          ctx.restore();
        }
      }

      // Subtle CRT scanline overlay for atmosphere
      function drawScanlines(ctx) {
        ctx.save();
        ctx.globalAlpha = 0.025;
        ctx.fillStyle = '#000';
        for (let y = 0; y < p.height; y += 4) {
          ctx.fillRect(0, y, p.width, 2);
        }
        ctx.restore();
      }

    }); // end p5
  </script>
</body>

</html>
